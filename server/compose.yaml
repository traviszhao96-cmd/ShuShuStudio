services:
  api:
    build: .
    restart: unless-stopped
    env_file:
      - /opt/fateish/secrets/api.env
    volumes:
      - /opt/fateish/data:/app/data
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
